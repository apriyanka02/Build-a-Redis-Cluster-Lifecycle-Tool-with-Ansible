- name: Post-upgrade verification
  hosts: redis-node-1
  become: yes
  tasks:
    - name: Check cluster ok
      shell: redis-cli -h 10.10.0.11 -p 6379 cluster info | grep cluster_state
      register: state
      failed_when: "'cluster_state:ok' not in state.stdout"

    - name: Verify data integrity
      shell: |
        passed=0; failed=0; missing=0
        for i in $(seq -w 1 1000); do
          key="key:${i}"
          expected=$(echo -n "${key}" | sha256sum | cut -d' ' -f1)
          actual=$(redis-cli -c -h 10.10.0.11 -p 6379 GET "${key}")
          if [ -z "$actual" ]; then missing=$((missing+1))
          elif [ "$actual" = "$expected" ]; then passed=$((passed+1))
          else failed=$((failed+1))
          fi
        done
        echo "PASSED=$passed FAILED=$failed MISSING=$missing"
        if [ $failed -eq 0 ] && [ $missing -eq 0 ]; then
          echo "RESULT: PASS — ${passed}/1000 keys verified"
        else
          echo "RESULT: FAIL"
          exit 1
        fi
      register: post_verify

    - name: Check all nodes version
      shell: |
        for host in 10.10.0.11 10.10.0.12 10.10.0.13 10.10.0.14 10.10.0.15 10.10.0.16; do
          ver=$(redis-cli -h $host -p 6379 info server | grep redis_version | cut -d: -f2 | tr -d '[:space:]')
          echo "$host: v$ver"
        done
      register: versions

    - name: Show results
      debug:
        msg: "{{ post_verify.stdout_lines + versions.stdout_lines }}"

    - name: UPGRADE COMPLETE
      debug:
        msg: "UPGRADE COMPLETE — all nodes on v{{ target_version }}, data integrity verified, cluster: ok"