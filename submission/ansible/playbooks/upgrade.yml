- name: Upgrade master redis-node-1
  hosts: redis-node-1
  become: yes
  tasks:
    - name: Get replica of node-1
      shell: |
        my_id=$(redis-cli -h 10.10.0.11 -p 6379 cluster nodes | grep "10.10.0.11:6379" | grep -v slave | awk '{print $1}')
        redis-cli -h 10.10.0.11 -p 6379 cluster nodes | grep slave | while read line; do
          master_id=$(echo "$line" | awk '{print $4}')
          if [ "$master_id" = "$my_id" ]; then
            echo "$line" | awk '{print $2}' | cut -d@ -f1
            break
          fi
        done
      register: replica_of_node1

    - name: Trigger failover
      shell: |
        replica_host=$(echo "{{ replica_of_node1.stdout }}" | cut -d: -f1)
        replica_port=$(echo "{{ replica_of_node1.stdout }}" | cut -d: -f2)
        redis-cli -h "$replica_host" -p "$replica_port" cluster failover

    - name: Wait for node-1 to become replica
      shell: |
        for i in $(seq 1 30); do
          role=$(redis-cli -h 10.10.0.11 -p 6379 info replication | grep ^role | cut -d: -f2 | tr -d '[:space:]')
          if [ "$role" = "slave" ]; then echo "failover done"; exit 0; fi
          sleep 2
        done
        exit 1

    - name: Stop Redis on node-1
      shell: redis-cli -p 6379 shutdown nosave || true
      ignore_errors: yes

    - name: Wait for port to close
      wait_for:
        host: "{{ cluster_ip }}"
        port: 6379
        state: absent
        timeout: 30

    - name: Download Redis {{ target_version }}
      get_url:
        url: "https://download.redis.io/releases/redis-{{ target_version }}.tar.gz"
        dest: "/tmp/redis-{{ target_version }}.tar.gz"
        timeout: 120

    - name: Extract Redis
      unarchive:
        src: "/tmp/redis-{{ target_version }}.tar.gz"
        dest: /tmp/
        remote_src: yes

    - name: Compile Redis
      shell: make -j$(nproc)
      args:
        chdir: "/tmp/redis-{{ target_version }}"

    - name: Install Redis
      shell: make install
      args:
        chdir: "/tmp/redis-{{ target_version }}"

    - name: Start Redis
      shell: nohup /usr/local/bin/redis-server /etc/redis/redis.conf > /var/log/redis/startup.log 2>&1 &

    - name: Wait for Redis ready
      wait_for:
        host: "{{ cluster_ip }}"
        port: 6379
        timeout: 60
        state: started

    - name: Wait for node-1 to rejoin and sync
      shell: |
        for i in $(seq 1 30); do
          link=$(redis-cli -h 10.10.0.11 -p 6379 info replication | grep master_link_status | cut -d: -f2 | tr -d '[:space:]')
          echo "Attempt $i: master_link_status=$link"
          if [ "$link" = "up" ]; then echo "node-1 rejoined and synced"; exit 0; fi
          sleep 3
        done
        echo "ERROR: node-1 did not rejoin after 90s"
        exit 1
      register: rejoin1

    - name: Show rejoin result
      debug:
        msg: "{{ rejoin1.stdout_lines }}"

